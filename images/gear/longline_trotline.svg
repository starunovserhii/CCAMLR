<svg viewBox="0 0 340 220" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <rect width="340" height="220" fill="#eaf1f8"/>
  <rect x="0" y="60" width="340" height="30" fill="#d7e5f0"/>
  <polygon points="150,60 190,60 180,80 160,80" fill="#1F4E79"/>
  <path d="M0,195 Q80,185 170,195 T340,195 L340,220 L0,220 Z" fill="#c9b98a"/>
  <!-- floating main line, curved between surface floats -->
  <path d="M30,110 Q80,120 130,112 T230,113 T310,110" fill="none" stroke="#1F4E79" stroke-width="2.5"/>
  <circle cx="30" cy="110" r="5" fill="#e0a800"/>
  <circle cx="130" cy="112" r="5" fill="#e0a800"/>
  <circle cx="230" cy="113" r="5" fill="#e0a800"/>
  <circle cx="310" cy="110" r="5" fill="#e0a800"/>
  <!-- trots (branch lines) hanging down with hook clusters -->
  <g stroke="#2E86AB" stroke-width="1.5">
    <line x1="65" y1="113" x2="65" y2="160"/>
    <line x1="165" y1="112" x2="165" y2="165"/>
    <line x1="270" y1="111" x2="270" y2="160"/>
  </g>
  <g stroke="#2E86AB" stroke-width="1.2" fill="none">
    <path d="M60,160 q-3,-5 2,-7"/><path d="M65,163 q-3,-5 2,-7"/><path d="M70,160 q-3,-5 2,-7"/>
    <path d="M160,165 q-3,-5 2,-7"/><path d="M165,168 q-3,-5 2,-7"/><path d="M170,165 q-3,-5 2,-7"/>
    <path d="M265,160 q-3,-5 2,-7"/><path d="M270,163 q-3,-5 2,-7"/><path d="M275,160 q-3,-5 2,-7"/>
  </g>
  <text x="90" y="30" font-size="15" font-weight="700" fill="#1F4E79">Trotline (тротлайн)</text>
  <text x="90" y="48" font-size="11" fill="#2E86AB" font-style="italic">Buoyed mainline, hook clusters</text>
  <text x="10" y="212" font-size="10" fill="#fff">Кластери наживлених гачків на тротах (відгалуженнях) від плавучої головної лінії</text>
</svg>
