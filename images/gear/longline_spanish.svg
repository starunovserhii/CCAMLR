<svg viewBox="0 0 340 220" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <rect width="340" height="220" fill="#eaf1f8"/>
  <rect x="0" y="60" width="340" height="30" fill="#d7e5f0"/>
  <polygon points="150,60 190,60 180,80 160,80" fill="#1F4E79"/>
  <path d="M0,195 Q80,185 170,195 T340,195 L340,220 L0,220 Z" fill="#c9b98a"/>
  <!-- main line -->
  <line x1="30" y1="180" x2="310" y2="180" stroke="#1F4E79" stroke-width="2.5"/>
  <!-- secondary backbone line -->
  <line x1="30" y1="200" x2="310" y2="200" stroke="#2E86AB" stroke-width="2"/>
  <circle cx="30" cy="180" r="4" fill="#595959"/>
  <circle cx="310" cy="180" r="4" fill="#595959"/>
  <circle cx="30" cy="200" r="4" fill="#595959"/>
  <circle cx="310" cy="200" r="4" fill="#595959"/>
  <!-- cross braces connecting the two lines -->
  <g stroke="#8a6300" stroke-width="1.3">
    <line x1="55" y1="180" x2="55" y2="200"/>
    <line x1="95" y1="180" x2="95" y2="200"/>
    <line x1="135" y1="180" x2="135" y2="200"/>
    <line x1="175" y1="180" x2="175" y2="200"/>
    <line x1="215" y1="180" x2="215" y2="200"/>
    <line x1="255" y1="180" x2="255" y2="200"/>
    <line x1="285" y1="180" x2="285" y2="200"/>
  </g>
  <!-- hooks off main line -->
  <g stroke="#2E86AB" stroke-width="1.5" fill="none">
    <line x1="75" y1="180" x2="75" y2="165"/><path d="M75,165 q-4,-6 3,-8"/>
    <line x1="115" y1="180" x2="115" y2="165"/><path d="M115,165 q-4,-6 3,-8"/>
    <line x1="155" y1="180" x2="155" y2="165"/><path d="M155,165 q-4,-6 3,-8"/>
    <line x1="195" y1="180" x2="195" y2="165"/><path d="M195,165 q-4,-6 3,-8"/>
    <line x1="235" y1="180" x2="235" y2="165"/><path d="M235,165 q-4,-6 3,-8"/>
    <line x1="270" y1="180" x2="270" y2="165"/><path d="M270,165 q-4,-6 3,-8"/>
  </g>
  <text x="55" y="30" font-size="15" font-weight="700" fill="#1F4E79">Spanish line (іспанська снасть)</text>
  <text x="55" y="48" font-size="11" fill="#2E86AB" font-style="italic">Double mainline longline</text>
  <text x="10" y="215" font-size="10" fill="#fff">До головної лінії приєднана додаткова станова лінія (backbone)</text>
</svg>
