  <text x="90" y="48" font-size="11" fill="#2E86AB" font-style="italic">Beehive configuration pot</text>
  <text x="10" y="212" font-size="10" fill="#fff">Вхід у передній панелі, приманка-мішок підвішена до даху</text>
</svg>
