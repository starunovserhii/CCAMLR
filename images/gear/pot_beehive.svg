  <path d="M128,190 C128,150 212,150 212,190" fill="none" stroke="#2E86AB" stroke-width="1"/>
  <path d="M138,190 C138,158 202,158 202,190" fill="none" stroke="#2E86AB" stroke-width="1"/>
  <line x1="110" y1="190" x2="230" y2="190" stroke="#1F4E79" stroke-width="2.5"/>
  <!-- front entrance funnel -->
  <ellipse cx="170" cy="175" rx="16" ry="8" fill="none" stroke="#8a6300" stroke-width="2"/>
  <!-- bait bag hanging from roof -->
  <ellipse cx="170" cy="150" rx="10" ry="13" fill="#e0a800" opacity="0.85"/>
