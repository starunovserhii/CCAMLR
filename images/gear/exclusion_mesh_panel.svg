<svg viewBox="0 0 340 220" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <rect width="340" height="220" fill="#eaf1f8"/>
  <!-- net cone -->
  <path d="M40,90 L280,60 L300,190 L60,190 Z" fill="none" stroke="#1F4E79" stroke-width="2"/>
  <path d="M70,100 L260,75 M85,120 L255,100 M95,140 L250,125 M105,160 L245,150 M115,178 L240,172" stroke="#2E86AB" stroke-width="0.8"/>
  <!-- diagonal mesh exclusion panel -->
  <line x1="90" y1="90" x2="230" y2="185" stroke="#8a6300" stroke-width="2.5"/>
  <line x1="100" y1="95" x2="222" y2="180" stroke="#8a6300" stroke-width="0.8"/>
  <line x1="110" y1="102" x2="212" y2="175" stroke="#8a6300" stroke-width="0.8"/>
  <line x1="120" y1="110" x2="202" y2="168" stroke="#8a6300" stroke-width="0.8"/>
  <!-- escape opening at top -->
  <ellipse cx="205" cy="70" rx="20" ry="8" fill="none" stroke="#e0a800" stroke-width="2.5"/>
  <!-- animal silhouette exiting -->
  <ellipse cx="245" cy="55" rx="14" ry="7" fill="#595959"/>
  <path d="M259,55 L272,50 M259,53 L272,58" stroke="#595959" stroke-width="2"/>
  <path d="M180,90 Q210,70 240,58" stroke="#e0a800" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#e0a800"/></marker></defs>
  <!-- codend -->
  <circle cx="290" cy="190" r="7" fill="#1F4E79"/>
  <text x="55" y="30" font-size="15" font-weight="700" fill="#1F4E79">Сітчаста панель (mesh panel)</text>
  <text x="55" y="48" font-size="11" fill="#2E86AB" font-style="italic">Marine mammal exclusion device</text>
  <text x="10" y="212" font-size="10" fill="#595959">Діагональна панель відводить велику тварину до отвору виходу над сіткою</text>
</svg>
