<svg viewBox="0 0 340 220" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <rect width="340" height="220" fill="#eaf1f8"/>
  <rect x="0" y="60" width="340" height="30" fill="#d7e5f0"/>
  <polygon points="150,60 190,60 180,80 160,80" fill="#1F4E79"/>
  <!-- seabed -->
  <path d="M0,195 Q80,185 170,195 T340,195 L340,220 L0,220 Z" fill="#c9b98a"/>
  <!-- single mainline -->
  <line x1="30" y1="190" x2="310" y2="190" stroke="#1F4E79" stroke-width="2.5"/>
  <!-- anchors -->
  <circle cx="30" cy="190" r="5" fill="#595959"/>
  <circle cx="310" cy="190" r="5" fill="#595959"/>
  <line x1="180" y1="80" x2="170" y2="190" stroke="#2E86AB" stroke-width="1.5" stroke-dasharray="3,2"/>
  <!-- snoods with hooks, evenly spaced -->
  <g stroke="#2E86AB" stroke-width="1.5" fill="none">
    <line x1="55" y1="190" x2="55" y2="175"/><path d="M55,175 q-4,-6 3,-8" />
    <line x1="90" y1="190" x2="90" y2="175"/><path d="M90,175 q-4,-6 3,-8" />
    <line x1="125" y1="190" x2="125" y2="175"/><path d="M125,175 q-4,-6 3,-8" />
    <line x1="160" y1="190" x2="160" y2="175"/><path d="M160,175 q-4,-6 3,-8" />
    <line x1="195" y1="190" x2="195" y2="175"/><path d="M195,175 q-4,-6 3,-8" />
    <line x1="230" y1="190" x2="230" y2="175"/><path d="M230,175 q-4,-6 3,-8" />
    <line x1="265" y1="190" x2="265" y2="175"/><path d="M265,175 q-4,-6 3,-8" />
  </g>
  <text x="70" y="30" font-size="15" font-weight="700" fill="#1F4E79">Autoline (донний ярус)</text>
  <text x="70" y="48" font-size="11" fill="#2E86AB" font-style="italic">Bottom longline, single mainline</text>
  <text x="10" y="212" font-size="10" fill="#fff">Гачки на коротких повідцях (снудах), однакова відстань, наживка — механічно</text>
</svg>
